<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1e2d3d;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:Arial,sans-serif;}
.box{background:#fff;border-radius:16px;padding:36px 44px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35);max-width:400px;width:90%;}
.logo{width:68px;height:68px;margin:0 auto 16px;display:block;}
h2{font-size:19px;color:#1e2d3d;margin-bottom:4px;}
.sub{font-size:12px;color:#999;margin-bottom:22px;}
.steps{text-align:left;background:#F4F6F9;border-radius:8px;padding:14px 18px;margin-bottom:22px;}
.steps li{font-size:13px;color:#444;margin-bottom:5px;line-height:1.5;list-style:decimal;margin-left:16px;}
.btn{display:block;background:#1565C0;color:#fff;font-size:15px;font-weight:bold;padding:14px;border-radius:8px;border:none;cursor:pointer;width:100%;margin-bottom:10px;}
.btn:hover{background:#1976D2;}
.btn2{display:block;background:#F4F6F9;color:#1565C0;font-size:13px;font-weight:bold;padding:11px;border-radius:8px;border:1px solid #DDD;cursor:pointer;width:100%;margin-bottom:10px;}
.btn3{display:block;background:#F4F6F9;color:#546e7a;font-size:13px;font-weight:bold;padding:11px;border-radius:8px;border:1px solid #DDD;cursor:pointer;width:100%;}
.ok{font-size:12px;color:#2E7D32;background:#F1F8F1;border:1px solid #C8E6C9;border-radius:6px;padding:10px;margin-top:12px;display:none;}
@media print{
  @page{size:A4 portrait;margin:10mm 12mm;}
  body{background:#F4F6F9!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;display:block;}
  .box{display:none!important;}
  #pv{display:block!important;position:static!important;background:transparent!important;overflow:visible!important;}
  #pvc{display:block!important;}
  #pv>div>button{display:none!important;}
  #pv>div{background:transparent!important;padding:0!important;}
  table{page-break-inside:auto;}
  tr{page-break-inside:avoid;}
}
</style>
